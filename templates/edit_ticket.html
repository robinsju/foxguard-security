{% extends "base.html" %}
{% block title %}Edit Ticket #{{ ticket['id'] }} &middot; FoxGuard Security Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <h1 class="h4 mb-3">Edit Ticket #{{ ticket['id'] }}</h1>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="{{ url_for('edit_ticket', ticket_id=ticket['id']) }}">
          <div class="mb-3">
            <label for="title" class="form-label">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="title" name="title"
                   maxlength="120" required value="{{ ticket['title'] }}">
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="4">{{ ticket['description'] or '' }}</textarea>
          </div>

          <div class="row">
            <div class="col-sm-6 mb-3">
              <label for="severity" class="form-label">Severity</label>
              <select class="form-select" id="severity" name="severity">
                {% for level in severities %}
                  <option value="{{ level }}" {% if level == ticket['severity'] %}selected{% endif %}>{{ level }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-6 mb-3">
              <label for="status" class="form-label">Status</label>
              <select class="form-select" id="status" name="status">
                {% for state in statuses %}
                  <option value="{{ state }}" {% if state == ticket['status'] %}selected{% endif %}>{{ state }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn fg-btn">Save changes</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('ticket_detail', ticket_id=ticket['id']) }}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
