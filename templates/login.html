{% extends "base.html" %}
{% block title %}Log in &middot; FoxGuard Security Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3 text-center">Analyst Login</h1>
        <p class="text-muted small text-center mb-4">
          Sign in to access the security ticket dashboard.
        </p>
        <form method="post" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username"
                   autocomplete="username" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password"
                   autocomplete="current-password" required>
          </div>
          <button type="submit" class="btn fg-btn w-100">Log in</button>
        </form>
        <p class="text-muted small text-center mt-3 mb-0">
          Demo account: <code>analyst</code> / <code>FoxGuard123!</code>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
